name: Monitor llb.su tournament page

on:
  schedule:
    # Каждые 30 минут (UTC). Можно изменить на */15 или */60 при желании.
    - cron: '0,30 * * * *'
  workflow_dispatch: {}   # позволяет запустить вручную кнопкой "Run workflow"

permissions:
  contents: write   # нужно, чтобы workflow мог закоммитить state.json обратно

jobs:
  check-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update monitor state"
          git push
